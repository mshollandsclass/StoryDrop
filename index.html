<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StoryDrop — CenterStaged</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #1C1A2E;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER BAR ── */
    #cs-header {
      position: relative; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      height: 44px;
      background: rgba(245, 240, 234, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #DDD6CC;
      flex-shrink: 0;
    }

    #cs-header a.home-link {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #1C1A2E;
      font-size: 13px; font-weight: 700; letter-spacing: -0.2px;
      transition: opacity 0.2s;
    }
    #cs-header a.home-link:hover { opacity: 0.6; }
    #cs-header a.home-link:focus-visible {
      outline: 3px solid #5A3FA8;
      outline-offset: 2px;
      border-radius: 4px;
    }

    #cs-header svg {
      width: 22px; height: 22px;
      flex-shrink: 0;
    }

    .header-divider {
      width: 1px; height: 18px;
      background: #DDD6CC;
      margin: 0 4px;
    }

    .header-product {
      font-size: 13px; font-weight: 700;
      color: #5A3FA8; letter-spacing: 0.5px;
    }

    /* ── IFRAME ── */
    #game-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
